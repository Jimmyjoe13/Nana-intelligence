name: SEO — Extraction GSC mensuelle

on:
  schedule:
    # Le 1er du mois a 7h00 UTC
    - cron: '0 7 1 * *'
  # Declenchement manuel depuis l'onglet Actions
  workflow_dispatch:

jobs:
  gsc-extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Extraction rapport GSC
        env:
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
        run: python scripts/gsc_report.py

      - name: Commit rapport et creer branche SEO
        run: |
          git config user.email "seo-bot@nana-intelligence.fr"
          git config user.name "SEO Bot"
          MONTH=$(date +%Y-%m)
          git checkout -b seo/auto-$MONTH 2>/dev/null || git checkout seo/auto-$MONTH
          git add scripts/gsc_report_latest.json
          git diff --cached --quiet && echo "Aucun changement" || \
            git commit -m "seo: rapport GSC $MONTH extrait"
          git push origin seo/auto-$MONTH

      - name: Creer Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH=$(date +%Y-%m)
          gh pr create \
            --base main \
            --head seo/auto-$MONTH \
            --title "SEO $MONTH — rapport GSC pret" \
            --body "## Rapport GSC $MONTH extrait automatiquement

          Le fichier \`scripts/gsc_report_latest.json\` contient les donnees du mois.

          ### Prochaine etape
          Utilise le **RemoteTrigger Claude Desktop** \`trig_01QyXj5HDFEKrfChSdeTL5hP\` pour :
          - Analyser le rapport GSC
          - Appliquer les optimisations on-page (title, meta, h1/h2, FAQ schema)
          - Commiter les modifications dans cette branche

          ### Merger ensuite
          - [ ] Review des modifications HTML
          - [ ] Merger -> deploiement automatique GitHub Pages

          🤖 Extraction automatique — analyse via Claude Desktop (plan Pro)" \
            2>/dev/null || echo "PR deja existante"
